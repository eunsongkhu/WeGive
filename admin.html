<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeGive 제보 관리자 페이지</title>
    
    <!-- 파이어베이스 로드 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f6f9; margin: 0; padding: 40px; color: #333; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .hidden { display: none !important; }
        
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 800px; text-align: center; }
        h1 { margin-top: 0; color: #4361ee; font-size: 24px; }
        
        /* 암호 입력 UI */
        #auth-section input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; width: 250px; outline: none; margin-bottom: 20px; text-align: center; }
        #auth-section button { padding: 12px 24px; font-size: 16px; font-weight: bold; background: #4361ee; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        #auth-section button:hover { background: #304fe0; }

        /* 테이블 UI */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 15px; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #e9ecef; }
        th { background-color: #f8f9fa; font-weight: bold; color: #555; }
        tr:hover { background-color: #fdfdfd; }
        td.message-col { line-height: 1.5; word-break: break-all; }
        .no-data { padding: 30px; color: #999; font-style: italic; text-align: center; }
    </style>
</head>
<body>

    <!-- 🔒 인증 영역 -->
    <div id="auth-section" class="card">
        <h1>🛠️ 버그 및 개선 제보 확인</h1>
        <p style="color: #666; margin-bottom: 30px; font-size: 14px;">관리자 전용 페이지입니다. 비밀번호를 입력해주세요.</p>
        <input type="password" id="admin-pw" placeholder="비밀번호 입력">
        <br>
        <button onclick="checkPassword()">확인</button>
    </div>

    <!-- 📊 데이터 영역 -->
    <div id="admin-section" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0;">📬 접수된 제보 내역</h1>
            <button onclick="loadBugReports()" style="padding: 8px 16px; cursor: pointer; background: white; border: 1px solid #ddd; border-radius: 6px;">새로고침 ↻</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 25%;">접수 일시</th>
                    <th style="width: 75%;">제보 내용</th>
                </tr>
            </thead>
            <tbody id="bug-table-body">
                <!-- 제보 내용이 여기에 렌더링 됩니다 -->
            </tbody>
        </table>
    </div>

<script>
    // 기존 홈페이지와 동일한 Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyDh2Rin87cRXVxf5eTidxnrO93x0M7e4Dc",
        authDomain: "globalcitizenship-271c4.firebaseapp.com",
        projectId: "globalcitizenship-271c4",
        storageBucket: "globalcitizenship-271c4.firebasestorage.app",
        messagingSenderId: "360209413011",
        appId: "1:360209413011:web:d4715a7bf7ec2daf056e66"
    };    

    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
    } catch (e) {
        console.error("Firebase 초기화 에러:", e);
    }

    // 엔터키로도 로그인 되도록 설정
    document.getElementById("admin-pw").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            checkPassword();
        }
    });

    // 비밀번호 체크
    function checkPassword() {
        const pw = document.getElementById('admin-pw').value;
        if (pw === '20160309') {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            loadBugReports(); // 로그인 성공 시 데이터 로드
        } else {
            alert('비밀번호가 일치하지 않습니다.');
            document.getElementById('admin-pw').value = '';
        }
    }

    // 파이어베이스에서 'bug_reports' 데이터 가져오기
    function loadBugReports() {
        if (!db) return;

        const tbody = document.getElementById('bug-table-body');
        tbody.innerHTML = '<tr><td colspan="2" class="no-data">데이터를 불러오는 중입니다...</td></tr>';

        db.collection("bug_reports").orderBy("timestamp", "desc").get()
        .then((querySnapshot) => {
            tbody.innerHTML = ''; // 초기화
            
            if (querySnapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="2" class="no-data">아직 접수된 제보가 없습니다.</td></tr>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // 타임스탬프 변환 (서버 시간이 아직 안 들어간 직후일 수 있으므로 예외처리)
                let dateStr = "방금 전";
                if (data.timestamp) {
                    const dateObj = data.timestamp.toDate();
                    dateStr = dateObj.toLocaleString('ko-KR');
                }

                // 줄바꿈 보존을 위한 replace 처리
                const formattedMessage = data.message.replace(/\n/g, '<br>');

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #666; font-size: 13px;">${dateStr}</td>
                    <td class="message-col">${formattedMessage}</td>
                `;
                tbody.appendChild(tr);
            });
        })
        .catch((error) => {
            console.error("데이터 가져오기 에러:", error);
            tbody.innerHTML = '<tr><td colspan="2" class="no-data" style="color:red;">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>';
        });
    }
</script>
</body>
</html>
